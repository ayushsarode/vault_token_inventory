services:
  postgres:
    image: postgres:15-alpine
    container_name: sg_postgres
    environment:
      POSTGRES_USER: vault_token_inventory
      POSTGRES_PASSWORD: vault_token_inventory
      POSTGRES_DB: vault_token_inventory
    ports:
      - "5432:5432"
    volumes:
      - ./docker_data/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "vault_token_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  vault_token_inventory:
    build: .
    container_name: sg_vault_token_inventory
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_started
    environment:
      - DATABASE_DSN=postgres://vault_token_inventory:vault_token_inventory@postgres:5432/vault_token_inventory?sslmode=disable
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
      - API_KEY=vault_token_inventory-dev-key

  vault:
    image: hashicorp/vault:1.21
    container_name: sg_vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK

